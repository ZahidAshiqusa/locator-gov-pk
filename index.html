<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMEI TRACKER · GOVT SECURE PORTAL</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    /* Glowing orbs */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Main portal card */
    .gov-portal {
      max-width: 800px;
      width: 100%;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                  0 0 0 1px rgba(59, 130, 246, 0.1),
                  0 0 40px rgba(59, 130, 246, 0.2);
      overflow: hidden;
      position: relative;
      z-index: 1;
      animation: portalAppear 0.6s ease-out;
    }

    @keyframes portalAppear {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header section */
    .portal-header {
      padding: 32px 32px 20px 32px;
      border-bottom: 1px solid rgba(59, 130, 246, 0.2);
      position: relative;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .emblem-icon {
      font-size: 48px;
      filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5));
      animation: pulseGlow 3s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4)); }
      50% { filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.7)); }
    }

    .gov-title {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .gov-sub {
      font-size: 14px;
      color: #94a3b8;
      font-weight: 500;
      border-left: 3px solid #3b82f6;
      padding-left: 16px;
      margin-top: 4px;
    }

    .gov-badge {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(168, 85, 247, 0.2));
      display: inline-block;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      color: #93c5fd;
      margin-top: 16px;
      border: 1px solid rgba(59, 130, 246, 0.3);
      backdrop-filter: blur(10px);
      letter-spacing: 1px;
    }

    /* Body section */
    .portal-body {
      padding: 32px;
    }

    .official-label {
      font-weight: 600;
      font-size: 15px;
      color: #cbd5e1;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.5px;
    }

    .official-label::before {
      content: '📡';
      font-size: 18px;
    }

    /* Input wrapper */
    .imei-input-wrapper {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .imei-input {
      flex: 1;
      padding: 16px 20px;
      font-size: 18px;
      font-family: 'Courier New', 'JetBrains Mono', monospace;
      letter-spacing: 3px;
      background: rgba(15, 23, 42, 0.8);
      border: 2px solid rgba(59, 130, 246, 0.3);
      border-radius: 16px;
      color: #e2e8f0;
      font-weight: 600;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .imei-input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.3),
                  inset 0 0 10px rgba(59, 130, 246, 0.1);
      background: rgba(30, 41, 59, 0.9);
    }

    .imei-input::placeholder {
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      letter-spacing: normal;
      color: #64748b;
      font-weight: 400;
    }

    .imei-input:disabled {
      opacity: 0.6;
      border-color: rgba(100, 116, 139, 0.3);
    }

    /* Locate button */
    .locate-btn {
      padding: 16px 32px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      border: none;
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .locate-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    .locate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.5);
      background: linear-gradient(135deg, #2563eb, #7c3aed);
    }

    .locate-btn:hover::before {
      left: 100%;
    }

    .locate-btn:active {
      transform: translateY(0);
    }

    .locate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .locate-btn:disabled::before {
      display: none;
    }

    /* Result panel */
    .result-panel {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 20px;
      padding: 28px;
      margin-top: 16px;
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2),
                  0 10px 30px -10px rgba(0, 0, 0, 0.3);
      min-height: 160px;
      display: flex;
      align-items: center;
    }

    .official-notice {
      font-family: 'Segoe UI', 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 500;
      line-height: 1.6;
      color: #e2e8f0;
      word-break: break-word;
      width: 100%;
    }

    .official-notice strong {
      font-weight: 700;
      color: #fbbf24;
      background: rgba(251, 191, 36, 0.15);
      padding: 2px 10px;
      border-radius: 12px;
      font-family: 'Courier New', monospace;
      font-size: 1.05em;
      letter-spacing: 1px;
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    /* Modern loading spinner */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: 100%;
    }

    .spinner-wrapper {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .spinner {
      width: 80px;
      height: 80px;
      border: 3px solid rgba(59, 130, 246, 0.1);
      border-top: 3px solid #3b82f6;
      border-right: 3px solid #8b5cf6;
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
    }

    .spinner-inner {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 50px;
      height: 50px;
      border: 2px solid rgba(168, 85, 247, 0.1);
      border-bottom: 2px solid #a78bfa;
      border-left: 2px solid #60a5fa;
      border-radius: 50%;
      animation: spin-reverse 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes spin-reverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }

    .loading-text {
      color: #93c5fd;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .loading-sub {
      color: #64748b;
      font-size: 13px;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .loading-sub::before {
      content: '🛡️';
      font-size: 14px;
    }

    .timer-display {
      font-family: 'Courier New', monospace;
      color: #fbbf24;
      font-weight: 700;
      font-size: 18px;
      margin-top: 8px;
    }

    .placeholder-muted {
      color: #64748b;
      font-style: normal;
      font-weight: 400;
      text-align: center;
      display: block;
      width: 100%;
    }

    /* Fine print */
    .fine-print {
      margin-top: 24px;
      font-size: 12px;
      color: #475569;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(59, 130, 246, 0.15);
      padding-top: 18px;
    }

    /* IMEI highlight */
    .imei-highlight {
      color: #fbbf24;
      font-weight: 700;
      background: rgba(251, 191, 36, 0.1);
      padding: 2px 12px;
      border-radius: 12px;
      border: 1px solid rgba(251, 191, 36, 0.2);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .imei-input-wrapper {
        flex-direction: column;
      }
      
      .locate-btn {
        width: 100%;
      }
      
      .portal-header {
        padding: 24px 20px 16px 20px;
      }
      
      .portal-body {
        padding: 24px 20px;
      }
      
      .gov-title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
<div class="gov-portal">
  <div class="portal-header">
    <div class="header-top">
      <span class="emblem-icon">🛡️</span>
      <span class="gov-title">GOVERNMENT SECURE PORTAL</span>
    </div>
    <div class="gov-sub">PTA · Law Enforcement · Central Equipment Registry</div>
    <div class="gov-badge">⚡ IMEI TRACKING SYSTEM v2.0 ⚡</div>
  </div>

  <div class="portal-body">
    <label for="imeiInput" class="official-label">
      ENTER IMEI NUMBER FOR LOCATION TRACKING
    </label>
    <div class="imei-input-wrapper">
      <input type="text" id="imeiInput" class="imei-input" placeholder="357812345678901" maxlength="17" inputmode="numeric" autocomplete="off">
      <button class="locate-btn" id="locateBtn">🔍 LOCATE</button>
    </div>

    <!-- Result panel with modern styling -->
    <div class="result-panel" id="resultPanel">
      <div class="official-notice" id="messageDisplay">
        <span class="placeholder-muted">⏤ ENTER IMEI AND CLICK LOCATE ⏤</span>
      </div>
    </div>
    
    <div class="fine-print">
      <span>🔒 SECURE MILITARY CHANNEL · ENCRYPTED</span>
      <span>ARMY CENTER DERA GHAZI KHAN · CR 31 HQ</span>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    const imeiInput = document.getElementById('imeiInput');
    const locateBtn = document.getElementById('locateBtn');
    const messageDisplay = document.getElementById('messageDisplay');

    let loadingTimer = null;
    let countdownInterval = null;
    let isLocating = false;

    // Clean IMEI input to digits only
    imeiInput.addEventListener('input', function(e) {
      let val = this.value.replace(/\D/g, '');
      if (val.length > 15) val = val.slice(0, 15);
      this.value = val;
    });

    // Format IMEI with spaces for better readability in result
    function formatImeiForDisplay(imei) {
      if (imei.length === 0) return '________';
      if (imei.length <= 4) return imei;
      // Add space every 4 digits for readability
      return imei.match(/.{1,4}/g)?.join(' ') || imei;
    }

    // Start loading animation with 15-second countdown
    function startLoadingAndLocate(imeiDigits) {
      // Clear existing timers
      if (loadingTimer) {
        clearTimeout(loadingTimer);
        loadingTimer = null;
      }
      if (countdownInterval) {
        clearInterval(countdownInterval);
        countdownInterval = null;
      }

      // Disable UI during loading
      locateBtn.disabled = true;
      imeiInput.disabled = true;
      isLocating = true;

      let secondsLeft = 15;

      // Create loading UI with countdown
      const updateLoadingUI = () => {
        messageDisplay.innerHTML = `
          <div class="loading-container">
            <div class="spinner-wrapper">
              <div class="spinner"></div>
              <div class="spinner-inner"></div>
            </div>
            <div class="loading-text">TRACKING IMEI · SECURE CHANNEL</div>
            <div class="loading-sub">Connecting to central equipment registry</div>
            <div class="timer-display">⏳ ${secondsLeft} SECONDS REMAINING</div>
          </div>
        `;
      };

      // Initial loading UI
      updateLoadingUI();

      // Update countdown every second
      countdownInterval = setInterval(() => {
        secondsLeft--;
        if (secondsLeft > 0) {
          const timerElement = messageDisplay.querySelector('.timer-display');
          if (timerElement) {
            timerElement.textContent = `⏳ ${secondsLeft} SECONDS REMAINING`;
          }
        }
      }, 1000);

      // Set 15-second timer for result
      loadingTimer = setTimeout(() => {
        // Clear countdown interval
        if (countdownInterval) {
          clearInterval(countdownInterval);
          countdownInterval = null;
        }

        // Display the exact required message
        displayTrackingMessage(imeiDigits);
        
        // Re-enable UI
        locateBtn.disabled = false;
        imeiInput.disabled = false;
        isLocating = false;
        loadingTimer = null;
        
        // Focus back on input
        imeiInput.focus();
      }, 15000);
    }

    // Display exact government message
    function displayTrackingMessage(imei) {
      const cleanImei = imei.replace(/\s+/g, '').trim();
      
      let finalImeiDisplay;
      if (cleanImei === '') {
        finalImeiDisplay = '________';
      } else {
        finalImeiDisplay = formatImeiForDisplay(cleanImei);
      }

      // Exact required message
      const fullMessage = `This IMEI is Samsung's A32 Device Filed against robbery/snatching This ${finalImeiDisplay} is located from Army Center Dera Ghazi Khan CR 31 Headquarters`;
      
      // Style the IMEI in the message
      const styledMessage = fullMessage.replace(
        finalImeiDisplay,
        `<strong>${finalImeiDisplay}</strong>`
      );
      
      messageDisplay.innerHTML = styledMessage;
    }

    // Locate handler
    function onLocate() {
      if (isLocating) return;

      let rawValue = imeiInput.value.trim();
      const digitsOnly = rawValue.replace(/\D/g, '');
      
      imeiInput.value = digitsOnly;
      
      // Start loading and then show result after 15 seconds
      startLoadingAndLocate(digitsOnly);
    }

    locateBtn.addEventListener('click', onLocate);

    imeiInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (!isLocating) {
          onLocate();
        }
      }
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', function() {
      if (loadingTimer) clearTimeout(loadingTimer);
      if (countdownInterval) clearInterval(countdownInterval);
    });

    // Allow clicking on example placeholder to fill
    imeiInput.addEventListener('focus', function() {
      if (this.value === '') {
        this.placeholder = 'Enter 15-digit IMEI';
      }
    });

    imeiInput.addEventListener('blur', function() {
      if (this.value === '') {
        this.placeholder = 'e.g. 357812345678901';
      }
    });
  })();
</script>
</body>
</html>
